name: Windows Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:

env:
  IWYU_REF: clang_22
  LLVM_REF: llvmorg-22.1.8
  CACHE_VERSION: v5

jobs:
  build:
    runs-on: windows-latest

    steps:
      # -------------------------
      # Checkout sources
      # -------------------------
      - name: Checkout IWYU
        uses: actions/checkout@v4
        with:
          repository: include-what-you-use/include-what-you-use
          ref: ${{ env.IWYU_REF }}
          path: include-what-you-use

      # -------------------------
      # Restore LLVM cache
      # -------------------------
      - name: Restore LLVM cache
        id: llvm-cache
        uses: actions/cache/restore@v4
        with:
          path: llvm-install
          key: llvm-${{ runner.os }}-${{ env.LLVM_REF }}-clang-${{ env.CACHE_VERSION }}
          restore-keys: |
            llvm-${{ runner.os }}-${{ env.LLVM_REF }}-clang-
            llvm-${{ runner.os }}-
            
      - name: Checkout LLVM
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          ref: ${{ env.LLVM_REF }}
          path: llvm-project

      # -------------------------
      # Configure LLVM
      # -------------------------
      - name: Configure LLVM
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake `
            -S llvm-project/llvm `
            -B build-llvm `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DCMAKE_INSTALL_PREFIX=llvm-install `
            -DLLVM_ENABLE_PROJECTS=clang `
            -DLLVM_TARGETS_TO_BUILD=X86 `
            -DLLVM_ENABLE_ASSERTIONS=OFF

      # -------------------------
      # Build LLVM + Clang
      # -------------------------
      - name: Build LLVM + Clang
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        run: |
          cmake --build build-llvm --target clang --config Release
          cmake --build build-llvm --target install --config Release

      # -------------------------
      # Save LLVM cache immediately
      # -------------------------
      - name: Save LLVM cache
        if: steps.llvm-cache.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: llvm-install
          key: llvm-${{ runner.os }}-${{ env.LLVM_REF }}-clang-${{ env.CACHE_VERSION }}

      # -------------------------
      # Configure IWYU
      # -------------------------
      - name: Configure IWYU
        shell: pwsh
        run: |
          $workspace = "${{ github.workspace }}" -replace '\\', '/'
          $llvmDir = "$workspace/llvm-install/lib/cmake/llvm"
          $clangDir = "$workspace/llvm-install/lib/cmake/clang"
      
          cmake `
            -S include-what-you-use `
            -B build-iwyu `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DCMAKE_INSTALL_PREFIX=iwyu-install `
            -DLLVM_DIR="$llvmDir" `
            -DClang_DIR="$clangDir"

      # -------------------------
      # Build IWYU
      # -------------------------
      - name: Build include-what-you-use
        run: |
          cmake --build build-iwyu --target install --config Release

      # -------------------------
      # Upload artifact (even if build step fails)
      # -------------------------
      - name: Upload include-what-you-use
        uses: actions/upload-artifact@v4
        with:
          name: include-what-you-use-windows
          path: iwyu-install
